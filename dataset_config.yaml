# Hugging Face dataset repo ID
dataset_id: "HF/name_of_dataset"

# Optional dataset config/subset name.
# Ex: "default", "en", "20231101.en"
config_name: null

# Optional split (use null to download all splits)
# Ex: "train", "validation", "test"
split: null

# Usually "main", but can pin a commit hash or tag for reproducibility.
revision: "main"

# "prepared" = load with datasets, then save_to_disk()
# "raw" = download raw repo files
mode: "prepared"

output_dir: "./offline_datasets/name_of_dataset"
archive_path: "./offline_datasets/name_of_dataset/name_of_dataset.tar.gz"

# For private datasets, set this env var before running:
# export HF_TOKEN="hf_..."
token_env: "HF_TOKEN"

# Set true only if the dataset requires custom code.
trust_remote_code: false