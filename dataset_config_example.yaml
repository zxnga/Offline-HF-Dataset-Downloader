# "prepared" = load with datasets, then save_to_disk()
# "raw" = download raw repo files
mode: "raw"

# If prepared mode fails, try downloading raw repo files instead.
fallback_to_raw: false

# If a dataset still fails after fallback handling, skip it and continue.
continue_on_error: false

# After creating the archive, remove the downloaded dataset folder.
keep_only_archive: false

# "after_each" archives each dataset immediately after download.
# "end" downloads all datasets first, then creates archives.
archive_timing: "after_each"

# Keep Hugging Face's persistent cache under your user cache directory.
# Set false to use a temporary cache for this run and delete it afterward.
keep_hf_cache: true

# Discover and download every dataset config/subset by default.
all_config_names: false

# Base folder where one subfolder per dataset will be created.
output_dir: "./offline_datasets"

# Optional archive path.
# Set to null to create one archive per dataset.
archive_path: null

# Optional global run manifest path.
# Set to null to write download_manifest.json under output_dir.
global_manifest_path: null

# For private datasets, set this env var before running:
# export HF_TOKEN="hf_..."
token_env: "HF_TOKEN"

# Set true only if the dataset requires custom code.
trust_remote_code: false

datasets:
  # Hugging Face dataset repo ID.
  - dataset_id: "AgentPublic/sp_questions_corpus"

    # Optional dataset config/subset name.
    # Ex: "default", "en", "20231101.en"
    config_name: null

    # Optional list of dataset config/subset names.
    # Use this instead of config_name to download several subsets as separate folders.
    # Ex:
    # config_names:
    #   - "3dprinting"
    #   - "android"

    # Optional: discover and download every dataset config/subset.
    # Use this instead of config_name or config_names.
    # all_config_names: true

    # Optional split (use null to download all splits)
    # Ex: "train", "validation", "test"
    split: null

    # Usually "main", but can pin a commit hash or tag for reproducibility.
    revision: "main"

    # Optional: override the top-level mode for this dataset only.
    # mode: "prepared"

    # Optional: override the top-level fallback setting for this dataset only.
    # fallback_to_raw: true

    # Optional: override the top-level skip-on-error setting for this dataset only.
    # continue_on_error: true

    # Optional: override when archives are created for this dataset only.
    # archive_timing: "end"

  # Add more datasets here.
  # - dataset_id: "another_org/another_dataset"
  #   mode: "prepared"
  #   fallback_to_raw: true
  #   continue_on_error: true
  #   archive_timing: "end"
  #   config_name: null
  #   # config_names:
